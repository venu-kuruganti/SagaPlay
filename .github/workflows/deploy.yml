name: Build and Deploy to Azure Container Apps

on:
  push:
    branches:
      - Main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build the project
        run: |
          dotnet build ./UserService/UserService.csproj --configuration Release
          dotnet build ./CatalogService/CatalogService.csproj --configuration Release
          dotnet build ./WatchlistService/WatchlistService.csproj --configuration Release
          dotnet build ./RecommendationService/RecommendationService.csproj --configuration Release
          dotnet build ./NotificationService/NotificationService.csproj --configuration Release
          dotnet build ./ApiGateway/ApiGateway.csproj --configuration Release


      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ secrets.AZURE_CONTAINER_REGISTRY }}

      - name: Build and push Docker images
        run: |
           declare -A services=(
            ["user-service"]="UserService"
            ["catalog-service"]="CatalogService"
            ["watchlist-service"]="WatchlistService"
            ["notification-service"]="NotificationService"
            ["recommendation-service"]="RecommendationService"
            ["api-gateway"]="ApiGateway"
           )
           for svc in "${!services[@]}"; do
            echo "Building and pushing $svc..."
            docker build -t ${{ secrets.AZURE_CONTAINER_REGISTRY }}/$svc:latest ./${services[$svc]}
            docker push ${{ secrets.AZURE_CONTAINER_REGISTRY }}/$svc:latest
           done

      - name: Deploy to Azure Container Apps
        uses: azure/cli@v2
        with:
          inlineScript: |
             declare -A services=(
              ["user-service"]="UserService"
              ["catalog-service"]="CatalogService"
              ["watchlist-service"]="WatchlistService"
              ["notification-service"]="NotificationService"
              ["recommendation-service"]="RecommendationService"
              ["api-gateway"]="ApiGateway"
             )
              for svc in "${!services[@]}"; do
                echo "Deploying $svc..."
                az containerapp update \
                  --name $svc \
                  --resource-group ${{ secrets.RESOURCE_GROUP }} \
                  --image ${{ secrets.AZURE_CONTAINER_REGISTRY }}/$svc:latest \
                  --environment ${{ secrets.CONTAINER_APP_ENVIRONMENT }}
              done
