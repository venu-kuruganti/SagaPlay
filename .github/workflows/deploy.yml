name: Build and Deploy to Azure Container Apps

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build the project
        run: dotnet build --configuration Release

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ secrets.AZURE_CONTAINER_REGISTRY }}

      - name: Build and push Docker images
        run: |
          docker build -t ${{ secrets.AZURE_CONTAINER_REGISTRY }}/catalog-service:latest -f CatalogService/Dockerfile .
          docker push ${{ secrets.AZURE_CONTAINER_REGISTRY }}/catalog-service:latest

      - name: Deploy to Azure Container Apps
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp update \
              --name catalog-service \
              --resource-group ${{ secrets.RESOURCE_GROUP }} \
              --image ${{ secrets.AZURE_CONTAINER_REGISTRY }}/catalog-service:latest \
              --environment ${{ secrets.CONTAINER_APP_ENVIRONMENT }}
