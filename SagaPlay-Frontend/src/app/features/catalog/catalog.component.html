<div class="container-fluid p-3 main-view">

    <h3 class="text-uppercase">Catalog</h3>


    <div class="row">
        @for (item of items; track $index) {

        <div class="card mx-2 my-2">
            <img src="{{item.posterURL}}" class="card-img-top" width="500" height="auto" alt="">
            <div class="card-body">
                <h5 class="card-title">{{item.title}} </h5>               
            </div>
        </div>

        } <!--End of for-->
    </div>


</div>
