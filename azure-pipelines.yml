# Docker
# Build and push an image to Azure Container Registry
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
- Main

resources:
- repo: self

variables:
  # Container registry service connection established during pipeline creation
  dockerRegistryServiceConnection: '3fa55f4b-8897-4053-b960-acf65d946b60'
  imageRepository: 'sagaplaymicroservices'
  containerRegistry: 'sagaplaybackendregistry.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/SagaPlay-Backend/ApiGateway/Dockerfile'
  tag: '$(Build.BuildId)'
  resourceGroup: 'SagaPlayRG'
  containerEnv: 'SagaPlayEnv'
  location: 'southindia'

  # Agent VM image name
  vmImageName: 'ubuntu-latest'

stages:
- stage: Build
  displayName: Build and push stage
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: $(vmImageName)
    steps:
    - checkout: self
    - task: Docker@2
      displayName: Build and push an image to container registry
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)       
        tags: |
          $(tag)
    - script: |
        for svc in user-service catalog-service watchlist-service; do
          docker build -t $(acrLoginServer)/$svc:$(Build.BuildId) ./$svc
          docker push $(acrLoginServer)/$svc:$(Build.BuildId)
        done
    
  


