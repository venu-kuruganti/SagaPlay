version: '3.9'

networks:
  sagaplay-network:
    driver: bridge

services:
  user-service:
    build:
      context: .
      dockerfile: UserService/Dockerfile
    container_name: user-service
    environment:
      # Internal + external URLs
      - ASPNETCORE_URLS=http://+:8080       
    ports:
      - "5000:8080"  # HTTP      
    networks:
      - sagaplay-network

  catalog-service:
    build:
      context: .
      dockerfile: CatalogService/Dockerfile
    container_name: catalog-service
    environment:
      - ASPNETCORE_URLS=http://+:8080       
    ports:
      - "6000:8080"  # HTTP      
    networks:
      - sagaplay-network

  recommendation-service:
    build:
      context: .
      dockerfile: RecommendationService/Dockerfile
    container_name: recommendation-service   
    depends_on:
      - catalog-service
    environment:
      - ASPNETCORE_URLS=http://+:8080      
      # Internal service call (HTTP to avoid TLS trust issues in dev)
      - CatalogService__BaseUrl=http://catalog-service:8080
   
    ports:
      - "7000:8080"  # HTTP      
    networks:
      - sagaplay-network

  watchlist-service:
    build:
      context: .
      dockerfile: WatchListService/Dockerfile
    container_name: watchlist-service       
    environment:
      - ASPNETCORE_URLS=http://+:8080        
    ports:
      - "8000:8080"  # HTTP      
    networks:
      - sagaplay-network

  notification-service:
    build:
      context: .
      dockerfile: NotificationService/Dockerfile
    container_name: notification-service       
    environment:
      - ASPNETCORE_URLS=http://+:8080        
    ports:
      - "9000:8080"  # HTTP      
    networks:
      - sagaplay-network

  apigateway-service:
    build: 
      context: .
      dockerfile: ApiGateway/Dockerfile
    container_name: apigateway-service
    environment:
      - ASPNETCORE_URLS=http://+:8080        
    ports:
      - "4000:8080"  # HTTP      
    networks:
      - sagaplay-network
      
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"    # RabbitMQ main port
      - "15672:15672"  # Management UI
    networks:
      - sagaplay-network
